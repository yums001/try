<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💙 Time Capsule of Love 💙</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 16px;
        }

        .app-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .screen {
            padding: 24px;
        }

        .hidden {
            display: none !important;
        }

        /* Game Styles */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #e3f2fd;
            padding: 12px 20px;
            border-radius: 60px;
        }

        .heart-counter {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1565c0;
        }

        .reset-btn {
            background: #42a5f5;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .canvas-container {
            background: #e8f4ff;
            border-radius: 32px;
            padding: 10px;
            margin-bottom: 15px;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #e8f4ff;
            border-radius: 24px;
            cursor: grab;
            touch-action: none;
        }

        .game-message {
            background: #bbdef5;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            color: #0d47a1;
            font-weight: 500;
        }

        /* Code Screen */
        .code-container {
            text-align: center;
        }

        .code-container h2 {
            color: #1565c0;
            margin-bottom: 15px;
        }

        .code-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border: 2px solid #90caf9;
            border-radius: 60px;
            text-align: center;
            margin: 15px 0;
            font-family: monospace;
        }

        .blue-btn {
            background: #1e88e5;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
        }

        .error-msg {
            color: #d32f2f;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        /* Capsule Styles */
        .capsule-header {
            text-align: center;
            color: #1565c0;
            margin-bottom: 20px;
        }

        .two-columns {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .column {
            flex: 1;
            min-width: 200px;
        }

        .column h3 {
            color: #0d47a1;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #90caf9;
            border-radius: 20px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 10px;
        }

        .file-label {
            background: #e3f2fd;
            padding: 8px 12px;
            border-radius: 40px;
            display: inline-block;
            font-size: 0.85rem;
            color: #1565c0;
            cursor: pointer;
        }

        .preview {
            background: #e8f4ff;
            border-radius: 20px;
            padding: 10px;
            margin-top: 10px;
            font-size: 0.8rem;
            text-align: center;
        }

        .preview img {
            max-width: 100%;
            max-height: 100px;
            border-radius: 16px;
        }

        .lock-section {
            background: #e3f2fd;
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .lock-section input {
            padding: 12px;
            border: 2px solid #90caf9;
            border-radius: 40px;
            margin: 10px 0;
        }

        .status-box {
            background: #bbdef5;
            padding: 15px;
            border-radius: 28px;
            margin: 15px 0;
            text-align: center;
            font-weight: 500;
        }

        .locked-message {
            background: #ffccbc;
            color: #bf360c;
            padding: 20px;
            border-radius: 32px;
            text-align: center;
        }

        .open-btn {
            background: #43a047;
            width: 100%;
        }

        hr {
            margin: 20px 0;
            border-color: #90caf9;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="card">
        <!-- GAME SCREEN -->
        <div id="gameScreen" class="screen">
            <div class="game-header">
                <span class="heart-counter">💙 Hearts: <span id="heartCount">0</span>/10</span>
                <button id="resetGameBtn" class="reset-btn">⟳ Try Again</button>
            </div>
            <div class="canvas-container">
                <canvas id="gameCanvas" width="450" height="500" style="width:100%; height:auto; aspect-ratio:450/500"></canvas>
            </div>
            <div class="game-message" id="gameMessage">💙 Move left/right to catch hearts! 💙</div>
        </div>

        <!-- SECRET CODE SCREEN -->
        <div id="codeScreen" class="screen hidden">
            <div class="code-container">
                <h2>🔐 The Secret Date 🔐</h2>
                <p>Enter the exact date you said YES to my courtship</p>
                <input type="text" id="secretDateInput" class="code-input" placeholder="YYYY-MM-DD">
                <button id="verifyDateBtn" class="blue-btn">✨ Unlock Time Capsule ✨</button>
                <div id="codeErrorMsg" class="error-msg"></div>
            </div>
        </div>

        <!-- TIME CAPSULE SCREEN -->
        <div id="capsuleScreen" class="screen hidden">
            <div class="capsule-header">
                <h2>⏳ Our Time Capsule ⏳</h2>
                <p>Store your memories here</p>
            </div>

            <!-- EDITABLE SECTION (only visible when not locked) -->
            <div id="editableSection">
                <div class="two-columns">
                    <div class="column">
                        <h3>💌 Your Letter</h3>
                        <textarea id="herLetter" rows="4" placeholder="Write your message..."></textarea>
                        <label class="file-label">📸 Add Picture <input type="file" id="herImage" accept="image/*" style="display:none"></label>
                        <div id="herPreview" class="preview"></div>
                    </div>
                    <div class="column">
                        <h3>💌 My Letter</h3>
                        <textarea id="myLetter" rows="4" placeholder="My message for you..."></textarea>
                        <label class="file-label">📸 Add Picture <input type="file" id="myImage" accept="image/*" style="display:none"></label>
                        <div id="myPreview" class="preview"></div>
                    </div>
                </div>

                <div class="lock-section">
                    <h3>🔒 Lock the Capsule</h3>
                    <p>Choose when to open it:</p>
                    <input type="date" id="unlockDate">
                    <button id="lockCapsuleBtn" class="blue-btn">💎 Lock Forever Until That Date 💎</button>
                </div>
            </div>

            <div id="statusBox" class="status-box"></div>

            <!-- OPEN SECTION (only shows when date is reached) -->
            <div id="openSection" style="display: none;">
                <hr>
                <button id="attemptOpenBtn" class="blue-btn open-btn">📬 Open Time Capsule 📬</button>
                <div id="openResultArea" class="preview" style="margin-top: 15px;"></div>
            </div>

            <!-- LOCKED MESSAGE (shows when capsule is locked but date not reached) -->
            <div id="lockedMessage" class="locked-message" style="display: none;"></div>
        </div>
    </div>
</div>

<script>
    // ==================== GAME - ONE HEART AT A TIME ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 450;
    canvas.height = 500;

    let hearts = [];
    let caught = 0;
    let gameActive = true;
    let animationId = null;
    let basketX = canvas.width / 2 - 30;
    const BASKET_WIDTH = 60;
    const BASKET_HEIGHT = 25;
    let lastSpawnTime = 0;
    let frameCount = 0;

    class Heart {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = 16;
            this.speed = 2.5; // mas mabilis
        }
        
        draw() {
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.font = `${this.size}px "Segoe UI Emoji"`;
            ctx.fillStyle = "#ff3366";
            ctx.fillText("❤️", this.x - 8, this.y + 5);
            ctx.restore();
        }
        
        update() {
            this.y += this.speed;
        }
    }

    // Paisa-isang spawn
    function spawnSingleHeart() {
        if (!gameActive) return;
        if (hearts.length < 8) {
            let randX = 25 + Math.random() * (canvas.width - 50);
            hearts.push(new Heart(randX, -15));
        }
    }

    function drawBasket() {
        ctx.fillStyle = "#42a5f5";
        ctx.fillRect(basketX, canvas.height - BASKET_HEIGHT - 5, BASKET_WIDTH, BASKET_HEIGHT);
        ctx.fillStyle = "#64b5f6";
        ctx.fillRect(basketX + 5, canvas.height - BASKET_HEIGHT - 10, BASKET_WIDTH - 10, 10);
        ctx.font = "18px sans-serif";
        ctx.fillStyle = "white";
        ctx.fillText("🤍", basketX + 25, canvas.height - 12);
    }

    function drawBackground() {
        ctx.fillStyle = "#e8f4ff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Decorative waves
        ctx.strokeStyle = "#bbdef5";
        ctx.lineWidth = 1;
        for (let i = 0; i < 5; i++) {
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 40 - i * 30);
            ctx.quadraticCurveTo(canvas.width/2, canvas.height - 60 - i * 30, canvas.width, canvas.height - 40 - i * 30);
            ctx.stroke();
        }
    }

    function draw() {
        drawBackground();
        for (let heart of hearts) heart.draw();
        drawBasket();
        
        ctx.fillStyle = "#1565c0";
        ctx.font = "12px 'Segoe UI'";
        ctx.fillText("← slide →", canvas.width/2 - 30, 30);
    }

    function updateGame() {
        if (!gameActive) {
            draw();
            animationId = requestAnimationFrame(updateGame);
            return;
        }

        frameCount++;
        
        // Paisa-isang spawn - every 40 frames (approx 0.6 seconds)
        if (frameCount > 35 && hearts.length < 10) {
            spawnSingleHeart();
            frameCount = 0;
        }
        
        // Small random chance for variety
        if (Math.random() < 0.02 && hearts.length < 6) {
            spawnSingleHeart();
        }

        // Update hearts
        for (let i = 0; i < hearts.length; i++) {
            hearts[i].update();
        }

        // Collision
        for (let i = hearts.length - 1; i >= 0; i--) {
            const h = hearts[i];
            if (h.y + 12 >= canvas.height - BASKET_HEIGHT - 8 &&
                h.x + 5 > basketX && h.x - 5 < basketX + BASKET_WIDTH) {
                hearts.splice(i, 1);
                if (gameActive && caught < 10) {
                    caught++;
                    document.getElementById('heartCount').innerText = caught;
                    
                    if (caught === 10) {
                        gameActive = false;
                        document.getElementById('gameMessage').innerHTML = "🎉 PERFECT! 10 hearts caught! 🎉";
                        if (animationId) cancelAnimationFrame(animationId);
                        setTimeout(() => {
                            document.getElementById('gameScreen').classList.add('hidden');
                            document.getElementById('codeScreen').classList.remove('hidden');
                        }, 1000);
                        return;
                    }
                }
                continue;
            }
            
            if (h.y - 12 > canvas.height + 50) {
                hearts.splice(i, 1);
            }
        }

        draw();
        animationId = requestAnimationFrame(updateGame);
    }

    // Movement
    function handleMove(clientX) {
        if (!gameActive && caught >= 10) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        let canvasX = (clientX - rect.left) * scaleX;
        canvasX = Math.min(Math.max(canvasX, 0), canvas.width - BASKET_WIDTH);
        basketX = canvasX;
    }

    canvas.addEventListener('mousemove', (e) => handleMove(e.clientX));
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (e.touches[0]) handleMove(e.touches[0].clientX);
    });
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (e.touches[0]) handleMove(e.touches[0].clientX);
    });

    function initGame() {
        hearts = [];
        caught = 0;
        gameActive = true;
        frameCount = 0;
        document.getElementById('heartCount').innerText = "0";
        document.getElementById('gameMessage').innerHTML = "💙 Move left/right to catch hearts! 💙";
        basketX = canvas.width / 2 - BASKET_WIDTH / 2;
        
        if (animationId) cancelAnimationFrame(animationId);
        
        // Start with 1 heart
        setTimeout(() => spawnSingleHeart(), 200);
        
        animationId = requestAnimationFrame(updateGame);
    }

    document.getElementById('resetGameBtn').addEventListener('click', () => {
        if (animationId) cancelAnimationFrame(animationId);
        initGame();
        document.getElementById('gameScreen').classList.remove('hidden');
        document.getElementById('codeScreen').classList.add('hidden');
        document.getElementById('capsuleScreen').classList.add('hidden');
    });

    // ==================== SECRET CODE ====================
    const CORRECT_COURTSHIP_DATE = "2025-02-14"; // CHANGE THIS!
    
    function normalizeDate(input) {
        let cleaned = input.trim();
        if (cleaned.match(/^\d{4}-\d{1,2}-\d{1,2}$/)) return cleaned;
        let parts = cleaned.split(/[\/\-]/);
        if (parts.length === 3) {
            let y, m, d;
            if (parts[0].length === 4) { y = parts[0]; m = parts[1]; d = parts[2]; }
            else if (parts[2].length === 4) { d = parts[0]; m = parts[1]; y = parts[2]; }
            else return null;
            return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
        }
        return null;
    }

    document.getElementById('verifyDateBtn').addEventListener('click', () => {
        const input = document.getElementById('secretDateInput');
        const normalized = normalizeDate(input.value);
        const errorDiv = document.getElementById('codeErrorMsg');
        
        if (!normalized) {
            errorDiv.innerText = "💔 Invalid date! Use YYYY-MM-DD";
            return;
        }
        
        if (normalized === CORRECT_COURTSHIP_DATE) {
            errorDiv.innerText = "";
            document.getElementById('codeScreen').classList.add('hidden');
            document.getElementById('capsuleScreen').classList.remove('hidden');
            loadCapsuleFromStorage();
            updateCapsuleUI();
        } else {
            errorDiv.innerText = "❌ Wrong date! Try again ❌";
            input.value = "";
        }
    });

    // ==================== TIME CAPSULE ====================
    let capsuleLocked = false;
    let capsuleUnlockDate = null;
    let herImageBase64 = "", myImageBase64 = "";
    
    // File handlers
    document.getElementById('herImage').addEventListener('change', (e) => {
        if (capsuleLocked) return;
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                herImageBase64 = ev.target.result;
                document.getElementById('herPreview').innerHTML = `<img src="${herImageBase64}"><br>📸 Saved`;
                saveCapsule();
            };
            reader.readAsDataURL(file);
        }
    });
    
    document.getElementById('myImage').addEventListener('change', (e) => {
        if (capsuleLocked) return;
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                myImageBase64 = ev.target.result;
                document.getElementById('myPreview').innerHTML = `<img src="${myImageBase64}"><br>📸 Saved`;
                saveCapsule();
            };
            reader.readAsDataURL(file);
        }
    });
    
    function saveCapsule() {
        const data = {
            locked: capsuleLocked,
            unlockDate: capsuleUnlockDate,
            herLetter: document.getElementById('herLetter').value,
            myLetter: document.getElementById('myLetter').value,
            herImage: herImageBase64,
            myImage: myImageBase64,
        };
        localStorage.setItem('loveCapsule', JSON.stringify(data));
    }
    
    function loadCapsuleFromStorage() {
        const raw = localStorage.getItem('loveCapsule');
        if (raw) {
            const data = JSON.parse(raw);
            capsuleLocked = data.locked || false;
            capsuleUnlockDate = data.unlockDate || null;
            document.getElementById('herLetter').value = data.herLetter || "";
            document.getElementById('myLetter').value = data.myLetter || "";
            herImageBase64 = data.herImage || "";
            myImageBase64 = data.myImage || "";
            
            if (herImageBase64) document.getElementById('herPreview').innerHTML = `<img src="${herImageBase64}"><br>📸 Saved`;
            if (myImageBase64) document.getElementById('myPreview').innerHTML = `<img src="${myImageBase64}"><br>📸 Saved`;
        }
    }
    
    function updateCapsuleUI() {
        const today = new Date().toISOString().slice(0, 10);
        const editableDiv = document.getElementById('editableSection');
        const lockedMsgDiv = document.getElementById('lockedMessage');
        const openSectionDiv = document.getElementById('openSection');
        const statusBox = document.getElementById('statusBox');
        
        if (!capsuleLocked) {
            // Not locked yet - show editable
            editableDiv.style.display = "block";
            lockedMsgDiv.style.display = "none";
            openSectionDiv.style.display = "none";
            statusBox.innerHTML = "💭 Capsule not locked yet. Add your memories above!";
            statusBox.style.background = "#e3f2fd";
        } else {
            // Locked
            editableDiv.style.display = "none";
            
            if (today >= capsuleUnlockDate) {
                // Date reached - show open button
                lockedMsgDiv.style.display = "none";
                openSectionDiv.style.display = "block";
                statusBox.innerHTML = `🎉 The time has come! This capsule is ready to open on ${capsuleUnlockDate} 🎉`;
                statusBox.style.background = "#c8e6c9";
                statusBox.style.color = "#2e7d32";
            } else {
                // Date not reached - show locked message
                lockedMsgDiv.style.display = "block";
                openSectionDiv.style.display = "none";
                lockedMsgDiv.innerHTML = `🔒 COME BACK ON ${capsuleUnlockDate} 🔒<br><br>This time capsule is sealed until that date. Patience, love! 💙`;
                statusBox.innerHTML = `🔐 Capsule locked! Will open on ${capsuleUnlockDate}`;
                statusBox.style.background = "#ffccbc";
                statusBox.style.color = "#bf360c";
            }
        }
    }
    
    document.getElementById('lockCapsuleBtn').addEventListener('click', () => {
        if (capsuleLocked) {
            alert("Already locked!");
            return;
        }
        const unlockDate = document.getElementById('unlockDate').value;
        if (!unlockDate) {
            alert("Please select a future date!");
            return;
        }
        const today = new Date().toISOString().slice(0, 10);
        if (unlockDate <= today) {
            alert("Choose a date in the future!");
            return;
        }
        
        capsuleLocked = true;
        capsuleUnlockDate = unlockDate;
        saveCapsule();
        updateCapsuleUI();
    });
    
    document.getElementById('attemptOpenBtn').addEventListener('click', () => {
        const today = new Date().toISOString().slice(0, 10);
        
        if (today < capsuleUnlockDate) {
            document.getElementById('openResultArea').innerHTML = `⏳ Not yet! Come back on ${capsuleUnlockDate} ⏳`;
            return;
        }
        
        // Ask for secret code
        const code = prompt("🔐 Enter the secret code (the date you said YES to my courtship):");
        if (!code) return;
        
        const normalized = normalizeDate(code);
        if (normalized === CORRECT_COURTSHIP_DATE) {
            // Show capsule contents
            const herLetter = document.getElementById('herLetter').value || "(No letter)";
            const myLetter = document.getElementById('myLetter').value || "(No letter)";
            const herImg = herImageBase64 ? `<img src="${herImageBase64}" style="max-width:100%; max-height:150px; border-radius:16px;"><br>` : "";
            const myImg = myImageBase64 ? `<img src="${myImageBase64}" style="max-width:100%; max-height:150px; border-radius:16px;"><br>` : "";
            
            document.getElementById('openResultArea').innerHTML = `
                <div style="background:#e3f2fd; padding:16px; border-radius:24px;">
                    <h3 style="color:#1565c0;">💖 OPENED TIME CAPSULE 💖</h3>
                    <p><strong>💌 Your Letter:</strong><br>${herLetter}</p>
                    ${herImg}
                    <p><strong>💌 My Letter:</strong><br>${myLetter}</p>
                    ${myImg}
                    <p style="color:#0d47a1; margin-top:15px;">✨ Our love, frozen in time. Forever. ✨</p>
                </div>
            `;
        } else {
            document.getElementById('openResultArea').innerHTML = "❌ Wrong secret code! The capsule remains sealed. ❌";
        }
    });
    
    // Auto-save
    document.getElementById('herLetter').addEventListener('input', () => { if (!capsuleLocked) saveCapsule(); });
    document.getElementById('myLetter').addEventListener('input', () => { if (!capsuleLocked) saveCapsule(); });
    document.getElementById('unlockDate').addEventListener('change', () => { if (!capsuleLocked) saveCapsule(); });
    
    // Start
    initGame();
    loadCapsuleFromStorage();
    setTimeout(() => updateCapsuleUI(), 100);
</script>
</body>
</html>
